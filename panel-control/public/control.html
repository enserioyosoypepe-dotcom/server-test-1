<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel - Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171a;
    --panel:#1b1f24;
    --panel-alt:#21262c;
    --field:#23282f;
    --border:#2a3038;
    --text-bright:#e8eaed;
    --text-muted:#8b94a0;
    --text-faint:#5b6470;
    --accent-ok:#3ddc84;
    --accent-warn:#f5a623;
    --accent-error:#e5484d;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100%;
    background:
      radial-gradient(circle at 85% 0%, rgba(245,166,35,0.05), transparent 45%),
      var(--bg);
    color:var(--text-bright);
    font-family:var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .device{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  }

  .devicebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    background:var(--panel-alt);
  }

  .brand{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--text-faint);
    text-transform:uppercase;
  }

  .logout{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    background:none;
    border:none;
    cursor:pointer;
    display:none;
  }
  .logout:hover{ color:var(--text-muted); }

  .content{
    padding:32px 28px 30px;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 6px;
  }

  h1.title{
    font-size:22px;
    font-weight:600;
    margin:0 0 24px;
  }

  label{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 8px;
  }

  input[type="password"], input[type="text"], textarea{
    width:100%;
    background:var(--field);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text-bright);
    font-family:var(--sans);
    font-size:14px;
    padding:12px 14px;
    outline:none;
    resize:vertical;
    transition:border-color .15s ease;
  }

  input:focus, textarea:focus{
    border-color:var(--accent-ok);
  }

  textarea{ min-height:80px; line-height:1.5; }

  .field{ margin-bottom:18px; }

  button.primary{
    width:100%;
    background:var(--accent-ok);
    color:#0e1411;
    border:none;
    border-radius:10px;
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    padding:13px;
    cursor:pointer;
    transition:filter .15s ease;
  }
  button.primary:hover{ filter:brightness(1.08); }
  button.primary:active{ filter:brightness(0.95); }

  .msg{
    font-family:var(--mono);
    font-size:12px;
    line-height:1.5;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:16px;
    display:none;
  }
  .msg.show{ display:block; }
  .msg.error{ background:rgba(229,72,77,0.12); color:var(--accent-error); border:1px solid rgba(229,72,77,0.3); }
  .msg.warn{ background:rgba(245,166,35,0.12); color:var(--accent-warn); border:1px solid rgba(245,166,35,0.3); }
  .msg.ok{ background:rgba(61,220,132,0.12); color:var(--accent-ok); border:1px solid rgba(61,220,132,0.3); }

  #loginScreen, #controlScreen{ display:none; }
  #loginScreen.active, #controlScreen.active{ display:block; }

  .statusselect{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:2px;
  }
  .chip{
    font-family:var(--mono);
    font-size:11px;
    padding:6px 10px;
    border-radius:20px;
    border:1px solid var(--border);
    color:var(--text-muted);
    background:var(--field);
    cursor:pointer;
  }
  .chip:hover{ border-color:var(--text-faint); }

  .banner{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:11.5px;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:20px;
  }
  .banner.online{ background:rgba(61,220,132,0.1); color:var(--accent-ok); border:1px solid rgba(61,220,132,0.25); }
  .banner.offline{ background:rgba(229,72,77,0.1); color:var(--accent-error); border:1px solid rgba(229,72,77,0.25); }
  .dot{ width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
</style>
</head>
<body>

  <div class="device">
    <div class="devicebar">
      <span class="brand">Panel - Control</span>
      <button class="logout" id="logoutBtn">log out</button>
    </div>

    <div class="content">

      <!-- LOGIN -->
      <div id="loginScreen" class="active">
        <p class="eyebrow">Access</p>
        <h1 class="title">Log in</h1>
        <div class="msg" id="loginMsg"></div>
        <form id="loginForm">
          <div class="field">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" autocomplete="current-password" required>
          </div>
          <button type="submit" class="primary">Log in</button>
        </form>
      </div>

      <!-- CONTROL -->
      <div id="controlScreen">
        <div class="banner" id="connBanner"><span class="dot"></span><span id="connBannerText"></span></div>

        <p class="eyebrow">Edit</p>
        <h1 class="title">System state</h1>

        <div class="msg" id="saveMsg"></div>

        <form id="updateForm">
          <div class="field">
            <label for="nameInput">Name</label>
            <input type="text" id="nameInput" placeholder="System name">
          </div>
          <div class="field">
            <label for="descInput">Description</label>
            <textarea id="descInput" placeholder="System description"></textarea>
          </div>
          <div class="field">
            <label for="statusInput">Status</label>
            <input type="text" id="statusInput" placeholder="OK, Warning, Error...">
            <div class="statusselect" style="margin-top:8px;">
              <span class="chip" data-status="OK">OK</span>
              <span class="chip" data-status="Warning">Warning</span>
              <span class="chip" data-status="Error">Error</span>
              <span class="chip" data-status="Maintenance">Maintenance</span>
            </div>
          </div>
          <div class="field">
            <label for="reasonInput">Reason</label>
            <textarea id="reasonInput" placeholder="Why is the status set to this?"></textarea>
          </div>
          <button type="submit" class="primary">Save changes</button>
        </form>
      </div>

    </div>
  </div>

<script>
  const loginScreen = document.getElementById('loginScreen');
  const controlScreen = document.getElementById('controlScreen');
  const loginForm = document.getElementById('loginForm');
  const passwordInput = document.getElementById('passwordInput');
  const loginMsg = document.getElementById('loginMsg');
  const logoutBtn = document.getElementById('logoutBtn');

  const connBanner = document.getElementById('connBanner');
  const connBannerText = document.getElementById('connBannerText');
  const saveMsg = document.getElementById('saveMsg');
  const updateForm = document.getElementById('updateForm');

  const nameInput = document.getElementById('nameInput');
  const descInput = document.getElementById('descInput');
  const statusInput = document.getElementById('statusInput');
  const reasonInput = document.getElementById('reasonInput');

  let sessionPassword = null;

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => { statusInput.value = chip.dataset.status; });
  });

  function setMsg(el, text, kind){
    el.textContent = text;
    el.className = 'msg show ' + kind;
  }
  function clearMsg(el){
    el.className = 'msg';
  }

  function setBanner(online){
    if (online){
      connBanner.className = 'banner online';
      connBannerText.textContent = 'connected - changes save instantly';
    } else {
      connBanner.className = 'banner offline';
      connBannerText.textContent = 'server not reachable - you can still try to save, but it will not apply';
    }
  }

  async function loadCurrentState(){
    try{
      const res = await fetch('/api/state', { cache: 'no-store' });
      if (!res.ok) throw new Error('bad status');
      const state = await res.json();
      nameInput.value = state.name || '';
      descInput.value = state.description || '';
      statusInput.value = state.status || '';
      reasonInput.value = state.reason || '';
      setBanner(true);
    }catch(err){
      setBanner(false);
    }
  }

  function enterControlPanel(){
    loginScreen.classList.remove('active');
    controlScreen.classList.add('active');
    logoutBtn.style.display = 'inline-block';
    loadCurrentState();
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg(loginMsg);
    const pwd = passwordInput.value;

    try{
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });

      if (res.ok){
        sessionPassword = pwd;
        enterControlPanel();
      } else {
        const data = await res.json().catch(() => ({}));
        setMsg(loginMsg, data.message || 'Incorrect password.', 'error');
      }
    }catch(err){
      // Server not reachable: warn but let the user in anyway
      sessionPassword = pwd;
      setMsg(loginMsg, 'Could not reach the server. You can still get in, but changes will not save until it is back online.', 'warn');
      setTimeout(enterControlPanel, 900);
    }
  });

  logoutBtn.addEventListener('click', () => {
    sessionPassword = null;
    passwordInput.value = '';
    clearMsg(loginMsg);
    clearMsg(saveMsg);
    controlScreen.classList.remove('active');
    loginScreen.classList.add('active');
    logoutBtn.style.display = 'none';
  });

  updateForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg(saveMsg);

    const payload = {
      password: sessionPassword,
      name: nameInput.value,
      description: descInput.value,
      status: statusInput.value,
      reason: reasonInput.value
    };

    try{
      const res = await fetch('/api/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok){
        setBanner(true);
        setMsg(saveMsg, 'Changes saved. The display will update within a few seconds.', 'ok');
      } else if (res.status === 401){
        setMsg(saveMsg, 'Incorrect password. Nothing was saved.', 'error');
      } else {
        setMsg(saveMsg, 'The server rejected the changes.', 'error');
      }
    }catch(err){
      setBanner(false);
      setMsg(saveMsg, 'Could not connect to the server. Changes were not saved.', 'error');
    }
  });

  // Check the connection every 5s without overwriting what the user is typing
  setInterval(async () => {
    if (!controlScreen.classList.contains('active')) return;
    try{
      const res = await fetch('/api/state', { cache: 'no-store' });
      setBanner(res.ok);
    }catch(err){
      setBanner(false);
    }
  }, 5000);
</script>

</body>
</html>
