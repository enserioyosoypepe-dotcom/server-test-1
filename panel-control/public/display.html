<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel - Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171a;
    --panel:#1b1f24;
    --panel-alt:#21262c;
    --border:#2a3038;
    --text-bright:#e8eaed;
    --text-muted:#8b94a0;
    --text-faint:#5b6470;
    --accent-ok:#3ddc84;
    --accent-warn:#f5a623;
    --accent-error:#e5484d;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 15% 0%, rgba(61,220,132,0.05), transparent 45%),
      var(--bg);
    color:var(--text-bright);
    font-family:var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .device{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  }

  .devicebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    background:var(--panel-alt);
  }

  .brand{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--text-faint);
    text-transform:uppercase;
  }

  .conn{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-muted);
  }

  .led{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--text-faint);
    box-shadow:0 0 0 0 rgba(0,0,0,0);
    transition:background .3s ease, box-shadow .3s ease;
  }

  .led.ok{
    background:var(--accent-ok);
    box-shadow:0 0 10px 1px rgba(61,220,132,0.6);
    animation:pulse 2s ease-in-out infinite;
  }

  .led.error{
    background:var(--accent-error);
    box-shadow:0 0 10px 1px rgba(229,72,77,0.6);
  }

  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.45; }
  }

  .tabs{
    display:flex;
    border-bottom:1px solid var(--border);
  }

  .tab{
    flex:1;
    padding:14px 0;
    text-align:center;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    background:transparent;
    border:none;
    cursor:pointer;
    position:relative;
  }

  .tab.active{
    color:var(--text-bright);
  }

  .tab.active::after{
    content:'';
    position:absolute;
    left:20%;
    right:20%;
    bottom:-1px;
    height:2px;
    background:var(--accent-ok);
  }

  .panel{
    display:none;
    padding:32px 28px 36px;
    min-height:220px;
  }

  .panel.active{
    display:block;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 10px;
  }

  .name{
    font-size:26px;
    font-weight:600;
    margin:0 0 14px;
    line-height:1.25;
  }

  .description{
    font-size:15px;
    line-height:1.6;
    color:var(--text-muted);
    margin:0;
    white-space:pre-wrap;
  }

  .statusrow{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }

  .statusdot{
    width:12px;
    height:12px;
    border-radius:50%;
    flex-shrink:0;
    background:var(--text-faint);
  }

  .statusdot.ok{ background:var(--accent-ok); box-shadow:0 0 12px 2px rgba(61,220,132,0.5); }
  .statusdot.warn{ background:var(--accent-warn); box-shadow:0 0 12px 2px rgba(245,166,35,0.5); }
  .statusdot.error{ background:var(--accent-error); box-shadow:0 0 12px 2px rgba(229,72,77,0.5); }

  .statusvalue{
    font-family:var(--mono);
    font-size:22px;
    font-weight:700;
    letter-spacing:0.01em;
  }

  .reasonlabel{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 8px;
  }

  .reason{
    font-size:15px;
    line-height:1.6;
    color:var(--text-muted);
    margin:0;
    white-space:pre-wrap;
  }

  .footer{
    border-top:1px solid var(--border);
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-faint);
    background:var(--panel-alt);
  }

  @media (prefers-reduced-motion: reduce){
    .led.ok{ animation:none; }
  }
</style>
</head>
<body>

  <div class="device">
    <div class="devicebar">
      <span class="brand">Panel - Display</span>
      <span class="conn"><span class="led" id="led"></span><span id="connText">connecting...</span></span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="desc">Description</button>
      <button class="tab" data-tab="status">Status</button>
    </div>

    <div class="panel active" id="panel-desc">
      <p class="eyebrow">Name</p>
      <h1 class="name" id="nameValue">-</h1>
      <p class="eyebrow" style="margin-top:22px;">Description</p>
      <p class="description" id="descValue">-</p>
    </div>

    <div class="panel" id="panel-status">
      <div class="statusrow">
        <span class="statusdot" id="statusDot"></span>
        <span class="statusvalue" id="statusValue">-</span>
      </div>
      <p class="reasonlabel">Reason</p>
      <p class="reason" id="reasonValue">-</p>
    </div>

    <div class="footer">
      <span id="updatedText">no data</span>
      <span id="hostText"></span>
    </div>
  </div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const panels = {
    desc: document.getElementById('panel-desc'),
    status: document.getElementById('panel-status'),
  };
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      Object.values(panels).forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      panels[tab.dataset.tab].classList.add('active');
    });
  });

  const nameValue = document.getElementById('nameValue');
  const descValue = document.getElementById('descValue');
  const statusValue = document.getElementById('statusValue');
  const reasonValue = document.getElementById('reasonValue');
  const statusDot = document.getElementById('statusDot');
  const led = document.getElementById('led');
  const connText = document.getElementById('connText');
  const updatedText = document.getElementById('updatedText');
  const hostText = document.getElementById('hostText');

  hostText.textContent = location.host;

  function classifyStatus(status){
    const s = (status || '').toLowerCase();
    if (s.includes('not reachable') || s.includes('error') || s.includes('down')) return 'error';
    if (s.includes('ok') || s.includes('normal') || s.includes('active') || s.includes('online')) return 'ok';
    return 'warn';
  }

  function showUnreachable(){
    nameValue.textContent = 'server not reachable';
    descValue.textContent = 'server not reachable';
    statusValue.textContent = 'server not reachable';
    reasonValue.textContent = 'server not reachable';
    statusDot.className = 'statusdot error';
    led.className = 'led error';
    connText.textContent = 'disconnected';
  }

  function showState(state){
    nameValue.textContent = state.name;
    descValue.textContent = state.description;
    statusValue.textContent = state.status;
    reasonValue.textContent = state.reason;
    const kind = classifyStatus(state.status);
    statusDot.className = 'statusdot ' + kind;
    led.className = 'led ok';
    connText.textContent = 'connected';
    updatedText.textContent = 'updated ' + new Date().toLocaleTimeString();
  }

  async function poll(){
    try{
      const res = await fetch('/api/state', { cache: 'no-store' });
      if (!res.ok) throw new Error('bad status');
      const state = await res.json();
      showState(state);
    }catch(err){
      showUnreachable();
    }
  }

  poll();
  setInterval(poll, 3000);
</script>

</body>
</html>
